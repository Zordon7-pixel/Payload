<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="payloadGrad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100%" height="100%" rx="22%" fill="url(#payloadGrad192)" />
  
  <!-- Semi-truck cab (3/4 front view) -->
  <g transform="translate(96, 92)">
    <!-- Main cab body (rounded rectangle) -->
    <rect x="-34" y="-27" width="60" height="53" rx="8" fill="#f59e0b" />
    
    <!-- Windshield (large angular shape) -->
    <polygon points="-26,-21 -15,-27 15,-27 26,-21 26,-4 -26,-4" fill="#1f2937" opacity="0.8" />
    
    <!-- Front grille (horizontal lines) -->
    <rect x="-22" y="19" width="45" height="4.5" rx="2.2" fill="#f59e0b" opacity="0.7" />
    <rect x="-22" y="26" width="45" height="4.5" rx="2.2" fill="#f59e0b" opacity="0.7" />
    
    <!-- Left headlight -->
    <circle cx="-19" cy="8" r="6" fill="#fcd34d" />
    <!-- Right headlight -->
    <circle cx="19" cy="8" r="6" fill="#fcd34d" />
    
    <!-- Bumper detail -->
    <rect x="-30" y="32" width="60" height="7" rx="3.5" fill="#f59e0b" opacity="0.9" />
    
    <!-- Left wheel -->
    <circle cx="-19" cy="42" r="8" fill="#1f2937" />
    <circle cx="-19" cy="42" r="6" fill="#111827" />
    <!-- Right wheel -->
    <circle cx="19" cy="42" r="8" fill="#1f2937" />
    <circle cx="19" cy="42" r="6" fill="#111827" />
  </g>
  
  <!-- Speed line beneath truck -->
  <g transform="translate(52, 130)">
    <line x1="0" y1="0" x2="88" y2="0" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>