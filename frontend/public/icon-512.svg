<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="payloadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100%" height="100%" rx="22%" fill="url(#payloadGrad)" />
  
  <!-- Semi-truck cab (3/4 front view) -->
  <g transform="translate(256, 240)">
    <!-- Main cab body (rounded rectangle) -->
    <rect x="-90" y="-70" width="160" height="140" rx="20" fill="#f59e0b" />
    
    <!-- Windshield (large angular shape) -->
    <polygon points="-70,-55 -40,-70 40,-70 70,-55 70,-10 -70,-10" fill="#1f2937" opacity="0.8" />
    
    <!-- Front grille (horizontal lines) -->
    <rect x="-60" y="50" width="120" height="12" rx="6" fill="#f59e0b" opacity="0.7" />
    <rect x="-60" y="70" width="120" height="12" rx="6" fill="#f59e0b" opacity="0.7" />
    
    <!-- Left headlight -->
    <circle cx="-50" cy="20" r="16" fill="#fcd34d" />
    <!-- Right headlight -->
    <circle cx="50" cy="20" r="16" fill="#fcd34d" />
    
    <!-- Bumper detail -->
    <rect x="-80" y="85" width="160" height="18" rx="9" fill="#f59e0b" opacity="0.9" />
    
    <!-- Left wheel (hint of wheel at bottom) -->
    <circle cx="-50" cy="110" r="22" fill="#1f2937" />
    <circle cx="-50" cy="110" r="16" fill="#111827" />
    <!-- Right wheel -->
    <circle cx="50" cy="110" r="22" fill="#1f2937" />
    <circle cx="50" cy="110" r="16" fill="#111827" />
  </g>
  
  <!-- Speed line beneath truck (horizontal) -->
  <g transform="translate(140, 340)">
    <line x1="0" y1="0" x2="232" y2="0" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>